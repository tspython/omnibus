appId: info.getcomics.omnibus
productName: Omnibus
asar: true
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json

mac:
  category: public.app-category.entertainment
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.png

dmg:
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  perMachine: false
  runAfterFinish: true

linux:
  category: AudioVideo
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  synopsis: Search and download comics from GetComics

publish: null
