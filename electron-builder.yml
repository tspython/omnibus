appId: info.getcomics.omnibus
productName: Omnibus
asar: true
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json

mac:
  category: public.app-category.entertainment
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # identity: null forces ad-hoc signing of every binary (main exec,
  # frameworks, helpers) with an empty Team ID so Apple Silicon's signature-
  # match check passes on launch. Without this, only the main exec gets ad-
  # hoc signed and the Electron Framework's upstream signature causes a Team
  # ID mismatch at load time on arm64.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  icon: build/icon.png

dmg:
  writeUpdateInfo: false

win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  perMachine: false
  runAfterFinish: true

linux:
  category: AudioVideo
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  synopsis: Search and download comics from GetComics

publish: null
